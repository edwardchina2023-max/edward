<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片画廊 - 黄师傅</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a1a; color:#eee; font-family:"PingFang SC","Microsoft YaHei",sans-serif; padding:20px; }
  h1 { text-align:center; margin:20px 0; font-size:1.5rem; }
  .info { text-align:center; color:#888; margin-bottom:30px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; max-width:1600px; margin:0 auto; }
  .card { background:#2a2a2a; border-radius:12px; overflow:hidden; transition:transform 0.2s; cursor:pointer; }
  .card:hover { transform:scale(1.02); }
  .card img { width:100%; height:240px; object-fit:cover; display:block; }
  .card .meta { padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
  .card .name { font-size:0.85rem; font-weight:600; color:#ccc; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card .dims { font-size:0.72rem; color:#888; }
  .card .size { font-size:0.7rem; color:#666; }
  .card.selected { outline:3px solid #e74c3c; outline-offset:-3px; }
  .toolbar { position:sticky; top:0; z-index:100; background:rgba(26,26,26,0.95); backdrop-filter:blur(10px); padding:15px 20px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; align-items:center; border-bottom:1px solid #333; margin-bottom:24px; }
  .toolbar button { padding:8px 20px; border-radius:8px; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; }
  .btn-select { background:#e74c3c; color:#fff; }
  .btn-clear { background:#555; color:#fff; }
  .btn-export { background:#2ecc71; color:#fff; }
  #counter { color:#888; font-size:0.85rem; min-width:120px; text-align:center; }
  .category-tags { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
  .cat-tag { padding:4px 14px; border-radius:16px; background:#333; color:#aaa; cursor:pointer; font-size:0.8rem; border:1px solid transparent; }
  .cat-tag.active { background:#e74c3c33; border-color:#e74c3c; color:#e74c3c; }
  #exportBox { display:none; position:fixed; bottom:20px; right:20px; background:#2a2a2a; border:1px solid #e74c3c; border-radius:12px; padding:16px; max-width:400px; max-height:300px; overflow:auto; z-index:200; }
  #exportBox pre { font-size:0.75rem; color:#ccc; white-space:pre-wrap; }
  #exportBox .close { float:right; cursor:pointer; color:#e74c3c; font-weight:bold; }
  .usage-hint { text-align:center; color:#666; font-size:0.8rem; margin-top:12px; }
</style>
</head>
<body>
<div class="toolbar">
  <span style="font-weight:700;color:#e74c3c;">🖼 照片画廊</span>
  <button class="btn-select" onclick="toggleSelectMode()">选择模式</button>
  <button class="btn-clear" onclick="clearSelection()">清除选择</button>
  <button class="btn-export" onclick="exportSelection()">导出选中</button>
  <span id="counter">已选: 0</span>
  <span style="color:#888;font-size:0.8rem;">点击照片可选中/取消，用于替换网站图片</span>
</div>
<div class="category-tags" id="catTags">
  <span class="cat-tag active" onclick="filterCat('all',this)">全部</span>
  <span class="cat-tag" onclick="filterCat('portrait',this)">竖幅(人像)</span>
  <span class="cat-tag" onclick="filterCat('landscape',this)">横幅(风景)</span>
  <span class="cat-tag" onclick="filterCat('square',this)">方形</span>
  <span class="cat-tag" onclick="filterCat('large',this)">大图(>4MB)</span>
  <span class="cat-tag" onclick="filterCat('small',this)">小图(<1MB)</span>
</div>
<h1>黄师傅照片库（共 106 张）</h1>
<div class="info">点击照片查看大图并标记用途 | 选中的照片将用于替换网站图片</div>
<div class="grid" id="grid"></div>
<div id="exportBox"><span class="close" onclick="this.parentElement.style.display='none'">✕</span><pre id="exportContent"></pre></div>

let selectMode = true;
let selected = new Set();
let currentFilter = 'all';

function getCat(p) {
  const ratio = p.w / p.h;
  if (ratio > 1.2) return 'landscape';
  if (ratio < 0.8) return 'portrait';
  return 'square';
}
function getSizeCat(p) {
  if (p.size_kb > 4000) return 'large';
  if (p.size_kb < 1000) return 'small';
  return 'medium';
}

function filterCat(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  let filtered = photos;
  if (currentFilter === 'portrait') filtered = photos.filter(p => getCat(p) === 'portrait');
  else if (currentFilter === 'landscape') filtered = photos.filter(p => getCat(p) === 'landscape');
  else if (currentFilter === 'square') filtered = photos.filter(p => getCat(p) === 'square');
  else if (currentFilter === 'large') filtered = photos.filter(p => p.size_kb > 4000);
  else if (currentFilter === 'small') filtered = photos.filter(p => p.size_kb < 1000);

  let html = '';
  filtered.forEach((p, i) => {
    const idx = photos.indexOf(p);
    const sel = selected.has(idx) ? ' selected' : '';
    html += `<div class="card${sel}" onclick="togglePhoto(${idx}, this)" data-idx="${idx}">
      <img src="img/photos/thumb_${String(idx).padStart(3,'0')}.jpg" loading="lazy" alt="${p.file}">
      <div class="meta">
        <span class="name" title="${p.file}">${p.file}</span>
        <span class="dims">${p.w}×${p.h}</span>
      </div>
      <div style="padding:0 14px 10px;"><span class="size">${(p.size_kb/1024).toFixed(1)}MB · ${getCat(p)}</span></div>
    </div>`;
  });
  document.getElementById('grid').innerHTML = html;
}

function togglePhoto(idx, el) {
  if (selected.has(idx)) {
    selected.delete(idx);
    el.classList.remove('selected');
  } else {
    selected.add(idx);
    el.classList.add('selected');
  }
  updateCounter();
}

function toggleSelectMode() {
  selectMode = !selectMode;
  document.querySelector('.btn-select').textContent = selectMode ? '选择模式: ON' : '选择模式: OFF';
}

function clearSelection() {
  selected.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  updateCounter();
}

function updateCounter() {
  document.getElementById('counter').textContent = '已选: ' + selected.size;
}

function exportSelection() {
  const names = Array.from(selected).sort().map(i => photos[i].file).join('\n');
  document.getElementById('exportContent').textContent = '选中的照片:\n' + names;
  document.getElementById('exportBox').style.display = 'block';
}

renderGrid();
</script>

</html>
